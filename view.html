<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 12px 16px; background: #24292f; color: #fff; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    header .left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    header a.back { color: #fff; text-decoration: none; opacity: .85; }
    header .title { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    header a.dl { color: #fff; background: #2da44e; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: 600; white-space: nowrap; }
    iframe { flex: 1; border: none; width: 100%; }
  </style>
</head>
<body>
  <header>
    <div class="left">
      <a class="back" href="index.html">←</a>
      <span class="title" id="title">Document</span>
    </div>
    <a class="dl" id="dl" download>⬇ Descarcă</a>
  </header>
  <iframe id="frame"></iframe>
  <script>
    const p = new URLSearchParams(location.search);
    const f = p.get('f');
    const t = p.get('t') || 'Document';
    document.getElementById('title').textContent = t;
    document.title = t;
    if (f) {
      document.getElementById('frame').src = f;
      document.getElementById('dl').href = f;
    }
  </script>
</body>
</html>
