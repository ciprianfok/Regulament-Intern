<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cerere concediu — completează</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #eef1f5; color: #1f2328; }
    header { background: #24292f; color: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    header a.back { color: #fff; text-decoration: none; opacity: .85; }
    header .title { font-weight: 600; }
    main { max-width: 640px; margin: 24px auto; padding: 0 16px 60px; }
    .card { background: #fff; border: 1px solid #d0d7de; border-radius: 12px; padding: 22px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    .brand { font-size: 12px; font-weight: 700; letter-spacing: .5px; color: #656d76; text-align: left; margin: 0 0 4px; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: #656d76; font-size: 14px; margin: 0 0 18px; }
    label { display: block; font-size: 14px; font-weight: 600; margin: 14px 0 6px; }
    input, select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #d0d7de; border-radius: 8px;
      font-size: 15px; font-family: inherit; background: #fff;
    }
    input.invalid, select.invalid, .sigwrap.invalid { border-color: #cf222e; background: #fff6f6; }
    textarea { min-height: 80px; resize: vertical; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .hidden { display: none; }
    button {
      margin-top: 22px; width: 100%; padding: 13px; border: none; border-radius: 8px;
      background: #2da44e; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #2c974b; }
    .hint { font-size: 12px; color: #8a929b; margin-top: 14px; text-align: center; }
    .err { color: #cf222e; font-size: 13px; font-weight: 600; margin-top: 12px; text-align: center; display: none; }
    .sigwrap { border: 1px dashed #b0b8c0; border-radius: 8px; background: #fff; margin-top: 6px; }
    #sig { display: block; width: 100%; height: 160px; touch-action: none; border-radius: 8px; }
    .sigclear { margin-top: 8px; background: #eef1f5; color: #24292f; border: 1px solid #d0d7de;
      border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; width: auto; }
    .sigclear:hover { background: #e2e6eb; }
  </style>
</head>
<body>
  <header>
    <a class="back" href="index.html">←</a>
    <span class="title">Cerere concediu</span>
  </header>
  <main>
    <div class="card">
      <p class="brand">FUMEAZAOK / SMOKEMANIA</p>
      <h1>Cerere de concediu</h1>
      <p class="sub">Completează toate câmpurile și semnează, apoi apasă „Descarcă PDF".</p>

      <label>Nume și prenume</label>
      <input id="nume" type="text" placeholder="ex. Popescu Ion">

      <label>Angajat al</label>
      <select id="firma">
        <option value="" disabled selected>ex. Premium Vaping</option>
        <option>Premium Vaping</option>
        <option>Smoke Mania Online</option>
        <option value="__alt__">Altul...</option>
      </select>
      <input id="firma_alt" class="hidden" type="text" placeholder="Scrie firma" style="margin-top:8px">

      <label>Funcția</label>
      <select id="functia">
        <option value="" disabled selected>ex. Lucrător comercial</option>
        <option>Lucrător comercial</option>
        <option>Manager</option>
        <option value="__alt__">Altul...</option>
      </select>
      <input id="functia_alt" class="hidden" type="text" placeholder="Scrie funcția" style="margin-top:8px">

      <label>Magazinul / punctul de lucru</label>
      <input id="magazin" type="text" placeholder="ex. SmokeMania Centru">

      <label>Tipul concediului</label>
      <select id="tip">
        <option selected>Odihnă</option>
        <option>Fără plată</option>
        <option value="__alt__">Altele...</option>
      </select>
      <input id="tip_alt" class="hidden" type="text" placeholder="Scrie tipul concediului" style="margin-top:8px">

      <div class="row">
        <div>
          <label>De la data</label>
          <input id="dela" type="date">
        </div>
        <div>
          <label>Până la data</label>
          <input id="panala" type="date">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Număr de zile</label>
          <input id="zile" type="number" min="1" placeholder="ex. 5">
        </div>
        <div>
          <label>Data cererii</label>
          <input id="datacerere" type="date">
        </div>
      </div>

      <label>Semnătura</label>
      <div class="sigwrap" id="sigwrap"><canvas id="sig"></canvas></div>
      <button type="button" class="sigclear" id="sigclear">Șterge semnătura</button>

      <button id="gen">⬇ Descarcă PDF</button>
      <p class="err" id="err">Completează toate câmpurile și semnează înainte de descărcare.</p>
      <p class="hint">Documentul se generează în calculatorul tău. Fișierul model nu se modifică.</p>
    </div>
  </main>

  <script src="jspdf.umd.min.js"></script>
  <script>
    function noDia(s){
      return (s||'')
        .replace(/[ăâà]/g,'a').replace(/[ĂÂÀ]/g,'A')
        .replace(/[îì]/g,'i').replace(/[ÎÌ]/g,'I')
        .replace(/[șş]/g,'s').replace(/[ȘŞ]/g,'S')
        .replace(/[țţ]/g,'t').replace(/[ȚŢ]/g,'T')
        .replace(/[éè]/g,'e').replace(/[ÉÈ]/g,'E');
    }
    function raw(id){ return (document.getElementById(id).value || '').trim(); }
    function dRO(v){ if(!v) return '__________'; const p=v.split('-'); return p.length===3 ? p[2]+'.'+p[1]+'.'+p[0] : v; }

    function selVal(selId){
      const s = document.getElementById(selId);
      if (s.value === '__alt__') return raw(selId + '_alt');
      return raw(selId);
    }

    ['firma','functia','tip'].forEach(function(id){
      const s = document.getElementById(id);
      const alt = document.getElementById(id + '_alt');
      s.addEventListener('change', function(){
        if (s.value === '__alt__') { alt.classList.remove('hidden'); alt.focus(); }
        else { alt.classList.add('hidden'); alt.value = ''; }
      });
    });

    (function(){
      const d = new Date();
      const iso = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      document.getElementById('datacerere').value = iso;
    })();

    let zileEditatManual = false;
    document.getElementById('zile').addEventListener('input', function(){ zileEditatManual = true; });
    function calcZile(){
      const d1 = raw('dela'), d2 = raw('panala');
      if (!d1 || !d2 || zileEditatManual) return;
      const a = new Date(d1), b = new Date(d2);
      const diff = Math.round((b - a) / 86400000) + 1;
      if (diff > 0) document.getElementById('zile').value = diff;
    }
    document.getElementById('dela').addEventListener('change', calcZile);
    document.getElementById('panala').addEventListener('change', calcZile);

    const canvas = document.getElementById('sig');
    const ctx = canvas.getContext('2d');
    let drawing = false, hasSig = false;
    function resizeCanvas(){
      const ratio = window.devicePixelRatio || 1;
      canvas.width = canvas.offsetWidth * ratio;
      canvas.height = canvas.offsetHeight * ratio;
      ctx.scale(ratio, ratio);
      ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#111';
    }
    setTimeout(resizeCanvas, 50);
    function pos(e){
      const r = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: t.clientX - r.left, y: t.clientY - r.top };
    }
    function start(e){ drawing = true; hasSig = true; document.getElementById('sigwrap').classList.remove('invalid'); const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); }
    function move(e){ if(!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); }
    function end(){ drawing = false; }
    canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move);
    canvas.addEventListener('touchend', end);
    document.getElementById('sigclear').addEventListener('click', function(){
      ctx.clearRect(0, 0, canvas.width, canvas.height); hasSig = false;
    });

    document.getElementById('gen').addEventListener('click', function(){
      const campuri = ['nume','firma','functia','magazin','tip','dela','panala','zile','datacerere'];
      let ok = true;
      document.getElementById('err').style.display = 'none';
      campuri.forEach(function(id){
        const el = document.getElementById(id);
        el.classList.remove('invalid');
        let gol = raw(id) === '';
        if (el.value === '__alt__') { gol = raw(id + '_alt') === ''; if (gol) document.getElementById(id+'_alt').classList.add('invalid'); }
        if (gol) { el.classList.add('invalid'); ok = false; }
      });
      if (!hasSig) { document.getElementById('sigwrap').classList.add('invalid'); ok = false; }
      if (!ok) { document.getElementById('err').style.display = 'block'; return; }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      const L = 20; let y = 24;

      doc.setFont('helvetica','bold'); doc.setFontSize(13);
      doc.text('FUMEAZAOK / SMOKEMANIA', 105, y, { align: 'center' }); y += 8;
      doc.setFontSize(16);
      doc.text('CERERE DE CONCEDIU', 105, y, { align: 'center' }); y += 14;

      doc.setFont('helvetica','normal'); doc.setFontSize(12);
      const line = (label, value) => { doc.text(label + '  ' + value, L, y); y += 10; };

      line('Subsemnatul(a):', noDia(raw('nume')));
      line('Angajat al:', noDia(selVal('firma')));
      line('Functia:', noDia(selVal('functia')));
      line('Magazinul / punctul de lucru:', noDia(raw('magazin')));
      y += 2;
      doc.text('Va rog sa imi aprobati concediul de tip "' + noDia(selVal('tip')) + '"', L, y); y += 10;
      doc.text('pentru perioada  ' + dRO(raw('dela')) + '  -  ' + dRO(raw('panala'))
               + '   (' + raw('zile') + ' zile).', L, y); y += 16;

      doc.text('Data cererii: ' + dRO(raw('datacerere')), L, y); y += 22;

      doc.text('Semnatura solicitant,', L, y);
      doc.text('Aprobat,', 130, y); y += 4;
      doc.addImage(canvas.toDataURL('image/png'), 'PNG', L, y, 50, 20);
      y += 22;
      doc.text('_______________________', L, y);
      doc.text('_______________________', 120, y);

      const nume = (noDia(raw('nume')) || 'cerere').replace(/\s+/g,'_');
      doc.save('Cerere_CO_' + nume + '.pdf');
    });
  </script>
</body>
</html>
